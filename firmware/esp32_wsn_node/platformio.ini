[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    knolleary/PubSubClient@^2.8       ; MQTT Client library
    bblanchon/ArduinoJson@^6.21.3    ; Stack-safe JSON serialization
    adafruit/DHT sensor library@^1.4.6 ; DHTxx Sensor Library
    adafruit/Adafruit Unified Sensor@^1.1.14 ; Unified Sensor Abstraction
    adafruit/Adafruit BMP085 Library@^1.0.1 ; BMP085/BMP180 Barometric Sensor Library

build_flags = 
    -D CORE_DEBUG_LEVEL=5
